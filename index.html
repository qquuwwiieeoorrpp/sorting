<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>반배정 프로그램</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ADMIN_PASSWORD = "teacher1234";

    function App() {
      const [name, setName] = useState("");
      const [result, setResult] = useState(null); 
      const [students, setStudents] = useState({});

      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [adminUnlocked, setAdminUnlocked] = useState(false);
      const [pwInput, setPwInput] = useState("");
      const [pwError, setPwError] = useState(false);
      const [rawData, setRawData] = useState("");
      const [saveStatus, setSaveStatus] = useState("");
      const [loading, setLoading] = useState(true);

      const inputRef = useRef(null);

      // 처음 켜질 때 저장된 학생 데이터 불러오기
      useEffect(() => {
        try {
          const savedData = localStorage.getItem("class-students");
          if (savedData) {
            const parsed = JSON.parse(savedData);
            // 💡 방어 1: 과거 데이터가 꼬여서 null일 경우를 대비해 기본값 {} 설정!
            setStudents(parsed ? parsed : {});
          }
        } catch (error) {
          console.error("데이터 불러오기 에러:", error);
          setStudents({});
        }
        setLoading(false);
      }, []);

      const lookup = () => {
        const trimmed = name.trim();
        if (!trimmed) {
          setResult({ found: false, studentName: trimmed, reason: "empty" });
          return;
        }
        if (students[trimmed] !== undefined) {
          // 💡 방어 2: 엑셀에서 온 숫자가 들어와도 무조건 문자(String)로 안전하게 변환!
          setResult({ found: true, studentName: trimmed, cls: String(students[trimmed]) });
        } else {
          setResult({ found: false, studentName: trimmed, reason: "notfound" });
        }
      };

      const tryUnlock = () => {
        if (pwInput === ADMIN_PASSWORD) {
          setAdminUnlocked(true);
          setPwError(false);
          setPwInput("");
          const lines = Object.entries(students || {}).map(([n, c]) => `${n},${c}`).join("\n");
          setRawData(lines);
        } else {
          setPwError(true);
          setPwInput("");
        }
      };

      // 수동으로 텍스트 상자에서 저장하기
      const saveStudents = () => {
        const lines = rawData.split("\n").map(l => l.trim()).filter(Boolean);
        const newStudents = {};
        let errorLines = [];
        
        lines.forEach((line, i) => {
          const parts = line.split(",");
          if (parts.length >= 2) {
            const n = parts[0].trim();
            const c = parts.slice(1).join(",").trim(); 
            if (n && c) newStudents[n] = c;
            else errorLines.push(i + 1);
          } else {
            errorLines.push(i + 1);
          }
        });

        if (errorLines.length > 0) {
          setSaveStatus(`❌ 형식 오류 (${errorLines.length}줄): ${errorLines.join(", ")}번째 줄`);
          return;
        }

        try {
          localStorage.setItem("class-students", JSON.stringify(newStudents));
          setStudents(newStudents);
          setSaveStatus(`✅ ${Object.keys(newStudents).length}명 저장 완료`);
          setResult(null);
          setName("");
        } catch (e) {
          setSaveStatus("❌ 저장 실패. 다시 시도해 주세요.");
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = evt.target.result;
            const workbook = XLSX.read(data, { type: 'binary' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const excelData = XLSX.utils.sheet_to_json(worksheet);

            const newStudents = { ...students };
            let count = 0;

            excelData.forEach(row => {
              const studentName = row["성명"] || row["이름"];
              const grade = row["학년"] || "";
              const cls = row["반"];

              if (studentName && cls) {
                let infoText = "";
                if (grade) infoText += `${grade}학년 `;
                infoText += `${cls}반`;

                newStudents[String(studentName).trim()] = infoText;
                count++;
              }
            });

            localStorage.setItem("class-students", JSON.stringify(newStudents));
            setStudents(newStudents);
            
            const lines = Object.entries(newStudents).map(([n, c]) => `${n},${c}`).join("\n");
            setRawData(lines);
            
            setSaveStatus(`🎉 엑셀에서 ${count}명 자동 인식 완료!`);
            e.target.value = ""; 
          } catch (error) {
            console.error(error);
            setSaveStatus("❌ 엑셀 파일을 읽는 중 오류가 발생했습니다.");
          }
        };
        reader.readAsBinaryString(file);
      };

      const lockAdmin = () => {
        setAdminUnlocked(false);
        setShowAdminLogin(false);
        setPwInput("");
        setPwError(false);
        setSaveStatus("");
      };

      if (loading) return null;

      return (
        <div style={s.body}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
            * { box-sizing: border-box; margin: 0; padding: 0; }
            input, textarea, button { font-family: 'Noto Sans KR', sans-serif; }
            @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
            @keyframes pop { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
            @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
            .card { animation: fadeUp 0.6s ease both; }
            .result-pop { animation: pop 0.45s cubic-bezier(.34,1.56,.64,1) both; }
            .shake { animation: shake 0.4s ease both; }
            input:focus { outline: none; border-color: #c0392b !important; box-shadow: 0 0 0 3px rgba(192,57,43,0.1) !important; }
            textarea:focus { outline: none; border-color: #c0392b !important; }
            button:active { transform: scale(0.98); }
          `}</style>

          <div style={s.header} className="card">
            <div style={s.badge}>2027 새학기 안내</div>
            <h1 style={s.h1}>반배정 <span style={{color:"#c0392b"}}>조회</span></h1>
            <p style={s.subtext}>학생 이름을 입력하시면 배정된 반을 확인하실 수 있습니다.<br/>개인정보 보호를 위해 이름 조회만 제공됩니다.</p>
          </div>

          <div style={s.card} className="card" >
            <div style={{...s.topBar}} />
            <label style={s.label}>학생 이름</label>
            <input
              ref={inputRef}
              style={s.input}
              type="text"
              placeholder="예: 홍길동"
              value={name}
              onChange={e => { setName(e.target.value); setResult(null); }}
              onKeyDown={e => e.key === "Enter" && lookup()}
              autoComplete="off"
            />
            <button style={s.btn} onClick={lookup}>조 회 하 기</button>

            {result && result.found && (
              <div style={s.resultBox} className="result-pop" key={result.studentName}>
                <div style={s.resultName}>{result.studentName} 학생</div>
                <div style={s.resultLabel}>배정 결과</div>
                <div style={{...s.resultNum, fontSize: String(result.cls).length > 5 ? 32 : 50}}>
                  {String(result.cls).includes('반') ? result.cls : `${result.cls}반`}
                </div>
                <div style={s.resultMsg}>새학기를 축하합니다!<br/>담임선생님의 안내를 기다려 주세요.</div>
              </div>
            )}
            {result && !result.found && (
              <div style={s.errorBox} className={result ? "shake" : ""} key={"err"+result.studentName}>
                {result.reason === "empty"
                  ? "이름을 입력해 주세요."
                  : `'${result.studentName}' 학생의 배정 정보를 찾을 수 없습니다.\n이름을 다시 확인하시거나 담임선생님께 문의해 주세요.`}
              </div>
            )}
          </div>

          <div style={{marginTop: 40, width: "100%", maxWidth: 480}}>
            {!showAdminLogin && !adminUnlocked && (
              <div style={{textAlign:"center"}}>
                <button style={s.adminToggleBtn} onClick={() => setShowAdminLogin(true)}>
                  🔒 교사 전용 관리
                </button>
              </div>
            )}

            {showAdminLogin && !adminUnlocked && (
              <div style={s.pwCard} className="card">
                <div style={s.pwTitle}>교사 인증</div>
                <p style={{fontSize:13, color:"#7a5c50", marginBottom:16, lineHeight:1.6}}>관리자 비밀번호를 입력하세요.<br/>학부모님은 이 기능을 사용하실 수 없습니다.</p>
                <input
                  style={{...s.input, marginBottom:0}}
                  type="password"
                  placeholder="비밀번호"
                  value={pwInput}
                  onChange={e => { setPwInput(e.target.value); setPwError(false); }}
                  onKeyDown={e => e.key === "Enter" && tryUnlock()}
                  autoFocus
                />
                {pwError && <div style={{color:"#c0392b", fontSize:12, marginTop:8}}>❌ 비밀번호가 틀렸습니다.</div>}
                <div style={{display:"flex", gap:10, marginTop:14}}>
                  <button style={{...s.btn, flex:1, marginTop:0}} onClick={tryUnlock}>확인</button>
                  <button style={{...s.cancelBtn, flex:0.5}} onClick={() => { setShowAdminLogin(false); setPwError(false); setPwInput(""); }}>취소</button>
                </div>
              </div>
            )}

            {adminUnlocked && (
              <div style={s.adminCard} className="card">
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
                  <div style={s.pwTitle}>학생 정보 관리 🔓</div>
                  <button style={s.lockBtn} onClick={lockAdmin}>잠금</button>
                </div>
                
                <div style={s.excelBox}>
                  <div style={s.excelTitle}>📁 엑셀/CSV 자동 업로드</div>
                  <p style={s.excelDesc}>첫 번째 줄에 <strong>학년, 반, 성명(또는 이름)</strong> 제목이 있는 파일을 선택하세요.</p>
                  <input type="file" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} style={{fontSize: 12, marginTop: 8}} />
                </div>

                <div style={{textAlign: "center", margin: "14px 0", color: "#d4bfb0", fontSize: 12}}>— 또는 수동으로 텍스트 입력 —</div>

                <p style={{fontSize:12, color:"#7a5c50", marginBottom:14, lineHeight:1.7}}>
                  한 줄에 하나씩 <strong>이름,배정정보</strong> 형식으로 확인 및 수정하세요.
                </p>
                <textarea
                  style={s.textarea}
                  value={rawData}
                  onChange={e => { setRawData(e.target.value); setSaveStatus(""); }}
                  placeholder={"홍길동,1학년 2반\n김철수,
